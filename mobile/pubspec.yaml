name: ghelgheli_mobile
description: اپلیکیشن فارسی وفاداری کارت‌های فوتبالی قل‌قلی
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  socket_io_client: ^2.0.3+1
  shamsi_date: ^1.0.2
  intl: ^0.20.2
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "assets/icon/icon_background.png"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  adaptive_icon_monochrome: "assets/icon/icon_monochrome.png"
  min_sdk_android: 23

flutter_native_splash:
  color: "#060D18"
  image: assets/splash/splash_logo.png
  android_12:
    color: "#060D18"
    image: assets/splash/splash_logo.png
    icon_background_color: "#060D18"
  android: true
  ios: false
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
    - assets/avatars/
    - assets/icon/
    - assets/splash/
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
          weight: 400
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
        - asset: assets/fonts/Vazirmatn-ExtraBold.ttf
          weight: 800
