name: Backend and Admin CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - 'admin/**'
      - '.github/workflows/backend-admin-ci.yml'
  pull_request:

jobs:
  backend-syntax:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install
      - run: node -c src/server.js
  admin-build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: admin } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install
      - run: npm run build
