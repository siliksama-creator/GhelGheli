name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'Backend API base URL for the APK'
        required: false
        default: 'https://api.example.com'
      build_mode:
        description: 'APK build mode'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  analyze-and-build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create Android platform files
        run: flutter create --platforms=android .
      - name: Ensure Firebase compatible minSdk
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' android/app/build.gradle
          fi
      - name: Get dependencies
        run: flutter pub get
      - name: Full Flutter analyze
        run: flutter analyze
      - name: Build APK
        run: flutter build apk --${{ inputs.build_mode }} --dart-define=API_BASE_URL=${{ inputs.api_base_url }}
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghelgheli-${{ inputs.build_mode }}-apk
          path: mobile/build/app/outputs/flutter-apk/*.apk
