name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'Backend API base URL for the APK'
        required: false
        default: 'https://api.example.com'
      build_mode:
        description: 'APK build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
      split_per_abi:
        description: 'Build separate smaller APKs per CPU ABI (recommended for APK < 40 MB)'
        required: true
        default: true
        type: boolean
      obfuscate_release:
        description: 'Obfuscate Dart code in release mode and upload symbols'
        required: true
        default: true
        type: boolean

jobs:
  analyze-and-build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create Android platform files
        run: flutter create --platforms=android .
      - name: Ensure Firebase compatible minSdk
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' android/app/build.gradle
          fi
      - name: Get dependencies
        run: flutter pub get
      - name: Remove generated default widget test
        run: rm -rf test
      - name: Full Flutter analyze
        run: flutter analyze --no-fatal-infos
      - name: Build APK
        run: |
          ARGS="--${{ inputs.build_mode }} --dart-define=API_BASE_URL=${{ inputs.api_base_url }}"
          if [ "${{ inputs.split_per_abi }}" = "true" ]; then
            ARGS="$ARGS --split-per-abi"
          fi
          if [ "${{ inputs.build_mode }}" = "release" ] && [ "${{ inputs.obfuscate_release }}" = "true" ]; then
            ARGS="$ARGS --obfuscate --split-debug-info=build/symbols"
          fi
          echo "flutter build apk $ARGS"
          flutter build apk $ARGS
      - name: List APK sizes
        run: ls -lh build/app/outputs/flutter-apk/*.apk
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghelgheli-${{ inputs.build_mode }}-apk
          path: mobile/build/app/outputs/flutter-apk/*.apk
      - name: Upload release symbols
        if: ${{ inputs.build_mode == 'release' && inputs.obfuscate_release == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ghelgheli-release-symbols
          path: mobile/build/symbols
