name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create Android platform files
        run: flutter create --platforms=android .
      - name: Get dependencies
        run: flutter pub get
      - name: Build debug APK
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: flutter build apk --debug --dart-define=API_BASE_URL=${API_BASE_URL:-https://api.example.com}
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghelgheli-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
